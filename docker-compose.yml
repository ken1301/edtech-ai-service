version: '3.8'
services:
  cache:
    image: 'redis/redis-stack:latest'
    container_name: 'redis'
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT}:6379'
      - '8001:8001'
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru"
    networks:
      - ai-service-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: 'mongodb'
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - '${MONGO_PORT}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    networks:
      - ai-service-network
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: 'mongo-ui'
    restart: always
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/
    networks:
      - ai-service-network
    depends_on:
      mongodb:
        condition: service_healthy

networks:
  ai-service-network:
    driver: bridge

volumes:
  redis_data:
  mongo_data:

